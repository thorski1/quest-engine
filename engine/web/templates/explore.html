{% extends "base.html" %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
<script src="/static/overworld.js"></script>
<style>
  .explore-page { max-width: 820px; margin: 0 auto; }
  .explore-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .explore-title { font-size: 1.3rem; font-weight: 700; color: var(--text-bright); }
  .explore-canvas-wrap {
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 2px solid var(--border);
    box-shadow: var(--card-shadow);
  }
  .explore-controls {
    display: flex; justify-content: center; gap: 1.5rem;
    padding: 0.6rem; background: var(--bg-surface);
    border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    font-size: 0.75rem; color: var(--text-dim);
  }
  .explore-key { display: inline-flex; align-items: center; gap: 0.3rem; }
  .key-badge-sm {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 20px; padding: 0 4px;
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 3px; font-family: monospace; font-size: 0.65rem;
    color: var(--text-bright); font-weight: 700;
  }
  .explore-fallback {
    text-align: center; padding: 3rem; color: var(--text-dim);
  }
  .explore-fallback a { color: var(--primary); }
</style>
{% endblock %}

{% block content %}
<div class="explore-page">

  <div class="explore-header">
    <h1 class="explore-title">🗺️ {{ pack.title }} — Overworld</h1>
    <a href="{{ pack_url_prefix }}/" class="btn btn-ghost">Zone List</a>
  </div>

  <div class="explore-canvas-wrap">
    <div id="overworld-container"></div>
  </div>

  <div class="explore-controls">
    <span class="explore-key"><span class="key-badge-sm">W</span><span class="key-badge-sm">A</span><span class="key-badge-sm">S</span><span class="key-badge-sm">D</span> Move</span>
    <span class="explore-key"><span class="key-badge-sm">Enter</span> Enter Zone</span>
    <span class="explore-key"><span class="key-badge-sm">Esc</span> Back to Menu</span>
  </div>

  <noscript>
    <div class="explore-fallback">
      <p>The overworld requires JavaScript. <a href="{{ pack_url_prefix }}/">Go to zone list instead →</a></p>
    </div>
  </noscript>

</div>

<script>
window.QUEST_OVERWORLD_CONFIG = {
  zones: [
    {% for zone in zones %}
    {
      id: "{{ zone.id }}",
      name: "{{ zone.name }}",
      completed: {{ "true" if zone.completed else "false" }},
      locked: {{ "true" if zone.locked else "false" }},
      x: {{ loop.index0 % 4 }},
      y: {{ loop.index0 // 4 }}
    }{{ "," if not loop.last }}
    {% endfor %}
  ],
  theme: "{{ theme }}",
  packTitle: "{{ pack.title }}",
  onEnterZone: function(zoneId) {
    window.location.href = "{{ pack_url_prefix }}/zone/" + zoneId + "/intro";
  }
};

// Initialize overworld when script loads
document.addEventListener('DOMContentLoaded', function() {
  if (typeof QuestOverworld !== 'undefined') {
    QuestOverworld.init('overworld-container');
  }
});
</script>
{% endblock %}
